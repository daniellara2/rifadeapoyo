<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ RIFA DE APOYO ⚽</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#ffffff,#dbeafe,#7dd3fc);
overflow-x:hidden;
color:#111;
}

/* PARTICULAS */

body::before{
content:'';
position:fixed;
inset:0;
background-image:
radial-gradient(circle,#ffffff 2px,transparent 2px),
radial-gradient(circle,#bae6fd 3px,transparent 3px);
background-size:80px 80px;
animation:mover 12s linear infinite;
opacity:.4;
pointer-events:none;
z-index:-1;
}

@keyframes mover{
from{transform:translateY(0px);}
to{transform:translateY(120px);}
}

/* HEADER */

header{
background:linear-gradient(90deg,#1e3a8a,#2563eb,#38bdf8);
padding:30px 15px;
text-align:center;
position:relative;
overflow:hidden;
}

.bandera{
position:absolute;
inset:0;
opacity:.15;
background:
linear-gradient(
to bottom,
#ffffff 0%,
#ffffff 33%,
#7dd3fc 33%,
#7dd3fc 66%,
#ffffff 66%,
#ffffff 100%
);
}

header h1{
position:relative;
font-size:42px;
font-weight:900;
color:white;
text-shadow:
0 0 10px #fff,
0 0 20px #38bdf8,
0 0 30px #2563eb;
}

header p{
position:relative;
margin-top:12px;
font-size:20px;
font-weight:bold;
color:#facc15;
}

/* INFO */

.info{
background:rgba(255,255,255,.9);
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
text-align:center;
}

.info h2{
color:#1d4ed8;
margin-bottom:10px;
}

.contador{
margin-top:15px;
font-size:26px;
font-weight:bold;
color:#dc2626;
}

.nequi{
margin-top:20px;
padding:20px;
background:#ede9fe;
border-radius:15px;
font-size:20px;
font-weight:bold;
color:#4c1d95;
}

.nequi a{
display:inline-block;
margin-top:15px;
padding:12px 18px;
background:#4c1d95;
color:white;
border-radius:10px;
text-decoration:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:15px;
}

.numero{
border:none;
border-radius:15px;
padding:18px 0;
font-size:20px;
font-weight:bold;
background:white;
cursor:pointer;
transition:.2s;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.numero:hover{
transform:scale(1.05);
background:#dbeafe;
}

.ocupado{
background:#ef4444 !important;
color:white;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
width:90%;
max-width:400px;
padding:20px;
border-radius:20px;
}

.modal-content h2{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.btn{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:white;
}

.btn-verde{
background:#16a34a;
}

.btn-rojo{
background:#dc2626;
}

/* ANIMACION */

#gracias{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

#gracias h1{
font-size:45px;
color:#38bdf8;
text-shadow:0 0 20px white;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* FOOTER */

footer{
padding:25px;
text-align:center;
background:linear-gradient(90deg,#1e3a8a,#2563eb,#38bdf8);
color:white;
font-size:18px;
font-weight:bold;
margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:600px){

.grid{
grid-template-columns:repeat(4,1fr);
}

.numero{
font-size:18px;
}

header h1{
font-size:32px;
}

}

</style>
</head>

</body>
</html>
